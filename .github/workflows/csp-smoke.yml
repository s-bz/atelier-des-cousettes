name: CSP smoke test

# Verifies the live Content-Security-Policy header still contains every
# origin declared in `src/config/csp.js`. Fires on any successful
# deployment (Vercel's environment-name field is not filtered on —
# see code-review notes from #11 — because the string varies).

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to check'
        required: false
        default: 'https://couture-tarn.fr'

jobs:
  check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Resolve target URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CSP against SSOT
        run: node scripts/check-csp.mjs "${{ steps.url.outputs.url }}"
