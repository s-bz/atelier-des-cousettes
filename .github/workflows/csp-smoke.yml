name: CSP smoke test

# Verifies the live Content-Security-Policy header still contains every
# origin declared in `src/config/csp.js`.
#
# On `deployment_status`, we deliberately do NOT use
# `deployment_status.target_url` — Vercel sets that to the internal
# deployment alias (e.g. <project>-<hash>.vercel.app), which sits behind
# Vercel Deployment Protection and returns 401 with no CSP header.
# Instead we always check the public custom domain, which is where the
# header actually matters for real users.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to check (default: production domain)'
        required: false
        default: 'https://couture-tarn.fr'

env:
  PRODUCTION_URL: https://couture-tarn.fr

jobs:
  check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify CSP against SSOT
        env:
          TARGET_URL: >-
            ${{ github.event_name == 'workflow_dispatch'
                && github.event.inputs.url
                || env.PRODUCTION_URL }}
        run: node scripts/check-csp.mjs "$TARGET_URL"
