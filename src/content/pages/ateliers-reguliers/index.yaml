faqItems:
  - question: Quels sont les tarifs des ateliers réguliers ?
    answer: >-
      Les tarifs vont de 25 € à 55 € par mois selon la formule choisie. Le tissu
      et les fournitures ne sont pas compris. Pour les ateliers réguliers,
      l'adhésion annuelle à l'association Les P'tits Piafs est de 15 €.
  - question: Faut-il apporter son matériel ?
    answer: >-
      Chaque participant vient avec sa propre machine à coudre, ses accessoires
      et sa notice. Si vous n'avez pas de machine, Isabelle peut en prêter une
      sur demande préalable. Apportez également vos fournitures (tissu, fils,
      fermetures éclair) ainsi qu'un petit cahier pour prendre des notes et
      gagner en autonomie.
  - question: Quel niveau faut-il pour s'inscrire ?
    answer: >-
      Les ateliers sont ouverts à tous les niveaux, y compris les grands
      débutants. Isabelle adapte son accompagnement au niveau de chaque
      participant. Que vous n'ayez jamais touché une machine à coudre ou que
      vous souhaitiez vous perfectionner, vous êtes le bienvenu.
  - question: Comment fonctionne l'inscription ?
    answer: >-
      L'inscription se fait auprès d'Isabelle pour la saison entière (de
      septembre à juin). Le paiement est mensuel. Les places étant limitées pour
      garantir la qualité de l'accompagnement, il est conseillé de s'inscrire
      dès la rentrée.
  - question: Que peut-on réaliser en atelier ?
    answer: >-
      Vous venez avec le projet de votre choix : vêtements, accessoires,
      décoration, retouches. Vous pouvez aussi vous laisser inspirer par les
      revues mises à disposition. Isabelle vous guide pas à pas dans la
      réalisation de votre projet, de la coupe à la finition.
crossLinksText: >-
  Envie de découvrir une technique précise ? Consultez nos stages thématiques.
  Vous pouvez aussi venir ponctuellement lors d'un après-midi couture.
