title: Mes créations
subtitle: Robes et chapeaux
seoDescription: >-
  Galerie de créations couture par Isabelle Bultez : robes, chapeaux,
  accessoires faits main. L'Atelier des Cousettes à Verdalle et Revel, Tarn.
coverImage: /src/assets/images/covers/mes-creations/coverImage.jpeg
introduction: >-
  Découvrez les créations couture d'Isabelle Bultez, fondatrice de L'Atelier
  des Cousettes à Verdalle et Revel dans le Tarn. Cette galerie présente une
  sélection de robes, chapeaux et accessoires entièrement faits main. Chaque
  pièce est unique, réalisée avec des tissus soigneusement choisis et un
  savoir-faire artisanal. De la casquette gavroche aux robes sur mesure, ces
  créations illustrent la diversité des techniques enseignées dans les ateliers
  et stages de couture.
gallerySectionTitle: Galerie
emptyGalleryText: Galerie en cours de construction.
missingImageText: Image manquante
crossLinksText: >-
  Envie d'apprendre à réaliser vos propres créations ? Découvrez les
  différentes formules proposées par L'Atelier des Cousettes.
ctaLabel: Contactez-moi
