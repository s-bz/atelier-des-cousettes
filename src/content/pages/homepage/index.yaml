title: L'Atelier des Cousettes
subtitle: Cours de couture à Revel et Verdalle (Tarn)
seoDescription: >-
  Cours de couture, ateliers et stages à Revel et Verdalle (Tarn). Tous niveaux,
  petits groupes, de 25€ à 90€. Avec Isabelle, couturière diplômée CAP.
coverImage: /src/assets/images/covers/homepage/coverImage.jpeg
introductionTitle: Le plaisir de coudre dans le Tarn
introduction: >-
  Vous désirez créer vos propres vêtements, maîtriser votre machine à coudre ou
  simplement de passer un moment créatif ? Isabelle vous accueille en petits
  groupes à Verdalle et Revel.
introduction2: Débutants ou confirmés, choisissez la formule qui vous correspond.
