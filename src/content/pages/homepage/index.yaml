valuePropositionsTitle: Pourquoi choisir L'Atelier des Cousettes ?
valuePropositions:
  - title: Petits groupes
    description: >-
      Un accompagnement individualisé pour progresser à votre rythme, quel que
      soit votre niveau. Les groupes sont volontairement limités pour garantir
      un suivi de qualité.
  - title: Tous niveaux bienvenus
    description: >-
      Des grands débutants qui n'ont jamais touché une machine à coudre aux
      couturiers confirmés souhaitant se perfectionner, chacun trouve sa place.
  - title: Des formules pour tous
    description: >-
      Ateliers réguliers hebdomadaires, stages thématiques ponctuels ou
      après-midi couture sans engagement. Il y a forcément une formule qui vous
      correspond.
  - title: Tarifs accessibles
    description: De 25 € à 90 € selon la formule choisie, tissu et fournitures non compris.
  - title: Deux lieux de cours
    description: >-
      À la maison des associations de Revel et à l'atelier privé de Verdalle,
      dans le Tarn.
animatriceTitle: Votre animatrice
animatriceText: >
  Isabelle Bultez enseigne la couture depuis plus de dix ans. Diplômée du CAP
  couture flou, elle a fondé L'Atelier des Cousettes pour partager sa passion
  avec des élèves de tous âges et de tous niveaux.


  Son parcours mêle héritage familial — son arrière grand-père était tailleur —
  passion pour le patronage et engagement artisanal. Son approche est
  bienveillante et personnalisée : chaque participant progresse à son rythme sur
  le projet de son choix.
